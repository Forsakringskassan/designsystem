name: Docs (main)

on:
    push:
        branches: ["main"]

permissions:
    contents: write
    actions: write

jobs:
    enqueue:
        name: Enqueue docs deployment from main branch
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: "${{ github.ref_name }}"
            - name: Enqueue deployment
              env:
                  QUEUE_KIND: docs-main
                  QUEUE_SOURCE_REF: ${{ github.ref }}
                  QUEUE_SOURCE_SHA: ${{ github.sha }}
                  QUEUE_REQUESTED_BY: ${{ github.actor }}
                  QUEUE_SOURCE_WORKFLOW: docs-main
              run: .github/scripts/enqueue-gh-pages-deploy.sh
            - name: Trigger queue worker
              uses: actions/github-script@v8
              with:
                  script: |
                      await github.rest.actions.createWorkflowDispatch({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          workflow_id: "gh-pages-deploy-worker.yml",
                          ref: "main",
                      });
