name: Artifact size

on:
    pull_request:
        types: [opened, synchronize, reopened]

permissions:
    contents: read

jobs:
    analyze-base:
        name: Analyze (base)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout target branch
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ github.event.pull_request.base.ref }}
            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22.x
            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run build
            - name: Run analyzer
              uses: ext/artifact-size-analyzer/analyze@ef6b5b7db48682b36b735629a378ae4645c19746 # v1
              with:
                  config-file: .github/artifact-size.json
                  artifact-name: base-size

    analyze-current:
        name: Analyze (current)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout head ref
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22.x
            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run build
            - name: Run analyzer (current)
              uses: ext/artifact-size-analyzer/analyze@ef6b5b7db48682b36b735629a378ae4645c19746 # v1
              with:
                  config-file: .github/artifact-size.json
                  artifact-name: current-size

    compare:
        name: Compare
        permissions:
            contents: read
            pull-requests: write
        runs-on: ubuntu-latest
        needs: [analyze-base, analyze-current]
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22.x
            - name: Install dependencies
              run: npm ci
            - name: Compare results
              id: compare
              uses: ext/artifact-size-analyzer/compare@e6ea4695468f796425ace714a345ab717bfd1b70 # main
              with:
                  base-artifact: base-size
                  current-artifact: current-size
            - name: Post sticky PR comment
              uses: marocchino/sticky-pull-request-comment@v3
              with:
                  header: artifact-size-analyzer
                  message: |
                      ${{ steps.compare.outputs.markdown }}
