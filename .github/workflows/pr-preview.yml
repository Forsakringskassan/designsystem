name: Deploy PR previews

concurrency: docs-${{ github.ref }}

on:
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - closed

permissions:
    contents: write
    pull-requests: write

jobs:
    deploy-preview:
        if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - name: Use Node.js 22.x
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22.x
            - name: Install dependencies
              run: npm ci
            - name: Build documentation
              if: github.event.action != 'closed'
              uses: ./.github/actions/build-docs
              with:
                  example-apps: true
                  sandbox: true
            - uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
              id: preview
              with:
                  source-dir: ./public/
                  preview-branch: gh-pages
                  umbrella-dir: pr-preview
                  action: auto
                  comment: false
            - name: Leave a comment after deployment
              if: steps.preview.outputs.deployment-action == 'deploy' && env.deployment_status == 'success'
              uses: marocchino/sticky-pull-request-comment@v3
              with:
                  header: pr-preview
                  message: |
                      ##  Förhandsgranskning :bug: :mag:

                      Dokumentation och exampel applikationer finns att förhandsgranska på:

                      | Sida | URL |
                      |-|-
                      | Dokumentation | ${{ steps.preview.outputs.preview-url }} |
                      | Vue Sandbox | ${{ steps.preview.outputs.preview-url }}vue-sandbox |
                      | Applikationsmall | ${{ steps.preview.outputs.preview-url }}examples/page-layout |

                      Exempel för testning:

                      | Sida | URL |
                      |-|-
                      | Tabell | ${{ steps.preview.outputs.preview-url }}examples/table |

                      ---

                      ###### Senast uppdaterad ${{ steps.preview.outputs.action-start-time }} i [gh-pages](${{ github.server_url }}/${{ github.repository }}/tree/gh-pages).

            - uses: marocchino/sticky-pull-request-comment@v3
              if: steps.preview-step.outputs.deployment-action == 'remove' && env.deployment_status == 'success'
              with:
                  header: pr-preview
                  message: |
                      ##  Förhandsgranskning :bug: :mag:

                      Förhandsgranskning borttagen då pull request är stängd.
