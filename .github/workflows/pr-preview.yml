name: Deploy PR previews

on:
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - closed

permissions:
    contents: write
    # Required to dispatch gh-pages-deploy-worker after enqueue.
    actions: write

jobs:
    enqueue-preview:
        if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Enqueue deployment
              env:
                  QUEUE_KIND: pr-preview
                  QUEUE_SOURCE_REF: ${{ github.event.pull_request.head.ref }}
                  QUEUE_SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
                  QUEUE_PR_NUMBER: ${{ github.event.pull_request.number }}
                  QUEUE_PR_ACTION: ${{ github.event.action }}
                  QUEUE_REQUESTED_BY: ${{ github.actor }}
                  QUEUE_SOURCE_WORKFLOW: pr-preview
              run: .github/scripts/enqueue-gh-pages-deploy.sh
            - name: Trigger queue worker
              uses: actions/github-script@v8
              with:
                  script: |
                      await github.rest.actions.createWorkflowDispatch({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          workflow_id: "gh-pages-deploy-worker.yml",
                          ref: "main",
                      });
