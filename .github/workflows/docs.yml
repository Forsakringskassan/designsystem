name: Deploy

on:
    workflow_dispatch:
    workflow_call:

permissions:
    contents: write
    actions: write

jobs:
    enqueue:
        name: Enqueue deployment
        runs-on: ubuntu-latest
        if: github.ref_protected == true
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: "${{ github.ref_name }}"
            - name: Enqueue deployment
              env:
                  QUEUE_KIND: docs-version
                  QUEUE_SOURCE_REF: ${{ github.ref }}
                  QUEUE_SOURCE_SHA: ${{ github.sha }}
                  QUEUE_REQUESTED_BY: ${{ github.actor }}
                  QUEUE_SOURCE_WORKFLOW: docs
              run: .github/scripts/enqueue-gh-pages-deploy.sh
            - name: Trigger queue worker
              uses: actions/github-script@v8
              with:
                  script: |
                      await github.rest.actions.createWorkflowDispatch({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          workflow_id: "gh-pages-deploy-worker.yml",
                          ref: "main",
                      });
